alia:dataset:
  dc:identifier: MESINESP_2
  dc:title: 'MESINESP2 Corpora: Annotated data for medical semantic indexing in Spanish'
  dc:description: "MESINESP2 Corpora is a Spanish-language dataset designed for biomedical\
    \ semantic indexing and natural language processing. It contains three types of\
    \ documents:\n\nScientific Literature (MESINESP-L): Articles from the LILACS and\
    \ IBECS databases, annotated with DeCS codes. It includes more than 237,000 training\
    \ articles, a development set of 1,065 expert-annotated articles, and a test set\
    \ of 491 abstracts.\n\nClinical Trials (MESINESP-T): Records from the Spanish\
    \ Registry of Clinical Studies (REEC), with 3,560 training trials and development\
    \ and test sets manually annotated by experts.\n\nPatents (MESINESP-P): Spanish-language\
    \ patents with IPC codes \u201CA61P\u201D and \u201CA61K31,\u201D selected for\
    \ semantic similarity to MESINESP-L, with 115 development documents and 119 test\
    \ documents.\n\nAdditionally, each set includes JSON files. with biomedical entities\
    \ (drugs, diseases, symptoms, procedures) automatically extracted using BSC NERs.\
    \ This resource enables research in automatic classification, information retrieval,\
    \ and text mining in Spanish-language biomedicine."
  dcterms:subject: biomedical
