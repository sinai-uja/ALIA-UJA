  dc:identifier: Multi_Clin_Sum
  dc:title: 'MultiClinSum Dataset: Summarization of Clinical Case Reports in English,
    Spanish, French and Portuguese'
  dc:description: MultiClinSum is a shared task about the automatic summarization
    of clinical case reports in English, Spanish, French and Portuguese held as part
    of the BioASQ workshop at CLEF 2025. The task relies on a corpus of manually selected
    full clinical case reports and their corresponding clinical case report summaries
    derived from case report publications written in the previously mentioned languages.
