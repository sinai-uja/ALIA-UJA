  dc:identifier: Ministerio_Sanidad_Medic_Trans
  dc:title: Reports, publications, events, and agreements on Transfusion Medicine
    from the Ministry of Health
  dc:description: The Ministry of Health's website dedicated to Transfusion Medicine
    offers a compendium of key resources and documents to ensure the safety and efficacy
    of blood donation and transfusion in Spain. It includes information on the structure
    of the National Transfusion Safety System, agreements and recommendations issued
    by bodies such as the National Hemotherapy Commission, and relevant legislative
    aspects. It also addresses haemovigilance issues, promotes voluntary and altruistic
    donation, and provides access to reports, publications, conferences, and events
    related to the field of transfusion. This portal is an essential tool for healthcare
    professionals and entities involved in the management and supervision of transfusion
    medicine in the country.
