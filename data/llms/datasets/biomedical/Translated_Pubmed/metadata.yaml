alia:dataset:
  dc:identifier: Translated_Pubmed
  dc:title: Spanish abstracts from PubMed (machine-translated from English)
  dc:description: 'Spanish abstracts from PubMed (machine-translated from English)


    A state-of-the-art, domain-specific Neural Machine Translation system has been
    used to automatically translate a large number of articles (titles and abstracts)
    from PubMed, from English to Spanish. This dataset, in JSON format, provides MeSH
    terms and DeCS codes (if available), as well as other fields such as the year
    of publication for all articles.'
