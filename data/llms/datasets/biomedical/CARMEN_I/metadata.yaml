  dc:title: 'CARMEN_I: "A resource of anonymized electronic health records in Spanish
    and Catalan for training and testing NLP tools"'
  dc:description: "CARMEN-I is a clinical corpus in Spanish containing anonymised\
    \ medical documents from Hospital Cl\xEDnic de Barcelona, collected between March\
    \ 2020 and March 2022. Its main objective is to provide a realistic dataset for\
    \ the development and evaluation of natural language processing (NLP) tools applied\
    \ to the clinical field in Spanish, while preserving patient privacy."
