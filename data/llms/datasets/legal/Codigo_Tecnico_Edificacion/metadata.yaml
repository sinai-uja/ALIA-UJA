  dc:title: Spanish Technical Building Code
  dc:description: The Technical Building Code (CTE) in Spain provides direct access
    to Basic Documents (DB) such as structural, fire, accessibility, energy efficiency,
    noise, health, and safety, in addition to the Royal Decree and Part I, together
    with support guides, a catalog of construction elements, acoustic calculation
    programs, and complementary resources, forming a complete framework for the regulatory
    and technical verification of buildings, including programs, interpretive manuals,
    and data sheets.
