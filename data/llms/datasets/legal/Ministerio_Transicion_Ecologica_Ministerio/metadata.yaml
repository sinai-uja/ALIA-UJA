  dc:title: Strategic documents and plans of the Ministry for Ecological Transition
  dc:description: "The \u201CMinistry\u201D section of the website of the Ministry\
    \ for Ecological Transition and Demographic Challenge (MITECO) provides a comprehensive\
    \ overview of the ministry's structure, functions, and activities. It includes\
    \ detailed information on its organization, highlighting the various secretariats\
    \ and commissioners, such as the Secretary of State for Energy and the Secretary\
    \ of State for the Environment. It also presents the public bodies attached to\
    \ it, such as the State Meteorological Agency (AEMET) and the Hydrographic Confederations.\
    \ The section provides access to strategic documents and plans, such as the Integrated\
    \ National Energy and Climate Plan, the Just Transition Strategy, and the Green\
    \ Public Procurement Plan. In addition, specific initiatives related to the Mar\
    \ Menor and Do\xF1ana are detailed, as well as information on public employment,\
    \ training, scholarships, and internships. Resources for citizens are also provided,\
    \ including service units, public participation, and services by area of activity.\
    \ Overall, this section acts as a documentation and consultation center for understanding\
    \ MITECO's policies and actions in key areas such as energy, the environment,\
    \ and demographic challenges."
