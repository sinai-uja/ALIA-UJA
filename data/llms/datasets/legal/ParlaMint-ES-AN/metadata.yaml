  dc:title: Plenary sessions of the parliament of Andalusia
  dc:description: The source of the data is the official website of the Parliament
    of Andalusia. On this website, there is a section where the journals of the parliamentary
    sessions of Andalusia can be searched by date (https://www.parlamentodeandalucia.es/webdinamica/portal-web-parlamento/recursosdeinformacion/diariosdesesiones/plenos.do).
    Regarding the data contained, it includes information on the parliamentary debates
    held in the plenary sessions of the Parliament of Andalusia from its inception
    in 1982 until February 6, 2025. These debates cover topics such as [topic not
    specified]. It is important to note that, to obtain this data, the PDFs from the
    indicated link were downloaded and then processed using pytesseract. Therefore,
    the data may contain errors made by pytesseract in reading these PDFs.
