  dc:title: Documents on impact, vulnerability, adaptation, assessments, projects,
    and plans related to climate change in Spain.
  dc:description: "The \u201CClimate Change\u201D section of the MITECO website explains\
    \ the impacts, vulnerability, and adaptation of climate change and assessments\
    \ by sector. It delves into mitigation with tools such as carbon footprint calculators,\
    \ including calculators, projects, and specific plans. It presents initiatives\
    \ for education, training, and public awareness, as well as citizen participation\
    \ and international cooperation. It also includes sections dedicated to registration,\
    \ legislation, relevant dates, public participation, conferences, frequently asked\
    \ questions, publications, and links of interest, thus providing a comprehensive\
    \ and structured overview of the actions and documentation available on climate\
    \ change in Spain."
