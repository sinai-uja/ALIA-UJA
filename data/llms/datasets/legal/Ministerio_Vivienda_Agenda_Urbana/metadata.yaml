  dc:title: Studies and publications by the Ministry of Housing and Urban Agenda
  dc:description: The Studies and Publications page of the Ministry of Housing and
    Urban Agenda of Spain offers a compilation of technical and strategic documents
    related to housing, urban planning and sustainability. Among the available materials
    are reports from the Housing Observatory, catalogs of good practices in architecture
    and urban planning, accessibility guides in urbanized public spaces, and studies
    such as the "White Paper on Sustainability in Spanish Urban Planning". These documents
    provide detailed analyses, recommendations and regulatory frameworks that support
    public policies on housing and sustainable urban development.
